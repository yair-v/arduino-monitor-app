name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create placeholder APK
        run: |
          mkdir -p build
          echo "APK build test" > build/app.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/app.apk
